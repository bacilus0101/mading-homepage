<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEG Seebeck Voltage</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #d7e1ec;
      --hot: #dd251d;
      --cool: #2924e6;
      --cyan: #88f0ed;
      --yellow: #ffe36c;
      --wire: #596575;
      --blue: #315edb;
      --heatPower: .55;
      --carrierSpeed: 2.6s;
      --carrierAlpha: .85;
      --voltageGlow: .25;
      --shadow: 0 12px 28px rgba(26, 40, 64, .12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: var(--bg); font-family: "Noto Sans KR", "Pretendard", "Malgun Gothic", Arial, sans-serif; }
    main { min-height: 100vh; padding: 14px; display: grid; place-items: center; }
    .app { width: min(1280px, 100%); display: grid; grid-template-columns: 280px minmax(0, 1fr) 300px; gap: 12px; align-items: stretch; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; min-width: 0; }
    .title { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 1.25rem; letter-spacing: 0; }
    h2 { font-size: 1rem; letter-spacing: 0; }
    h3 { font-size: .9rem; letter-spacing: 0; }
    .title p { margin-top: 6px; color: var(--muted); font-size: .84rem; line-height: 1.5; }
    .controls { display: grid; gap: 18px; padding: 16px; }
    .control { display: grid; gap: 7px; }
    .control-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; font-size: .9rem; }
    label { font-weight: 900; color: #2f3d52; }
    .value { font-weight: 900; font-variant-numeric: tabular-nums; white-space: nowrap; }
    input[type="range"] { width: 100%; accent-color: var(--blue); }
    .note { margin: 0 16px 16px; padding: 12px; color: #334155; background: #f4f7fb; border: 1px solid var(--line); border-radius: 8px; font-size: .86rem; line-height: 1.55; }
    .diagram-panel { padding: 12px; display: grid; align-items: center; }
    .diagram-wrap { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; }
    svg { display: block; width: 100%; height: auto; }
    .svg-title { font-size: 28px; font-weight: 900; fill: var(--ink); }
    .svg-sub { font-size: 15px; fill: var(--muted); }
    .svg-label { font-size: 19px; font-weight: 900; fill: var(--ink); }
    .svg-small { font-size: 14px; fill: #475569; }
    .heat-band { opacity: calc(.35 + var(--heatPower) * .65); }
    .voltage-glow { filter: drop-shadow(0 0 calc(var(--voltageGlow) * 26px) rgba(49, 94, 219, .9)); }
    .carrier { font-size: 24px; font-weight: 900; fill: #111827; opacity: var(--carrierAlpha); animation: fall var(--carrierSpeed) linear infinite; }
    .d1 { animation-delay: -.2s; } .d2 { animation-delay: -.55s; } .d3 { animation-delay: -.9s; } .d4 { animation-delay: -1.25s; }
    @keyframes fall { from { transform: translateY(-20px); opacity: .15; } 20% { opacity: var(--carrierAlpha); } 80% { opacity: var(--carrierAlpha); } to { transform: translateY(58px); opacity: .15; } }
    .results { display: grid; gap: 12px; padding: 14px; }
    .result { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #f8fafc; }
    .result span { display: block; color: var(--muted); font-size: .82rem; font-weight: 800; }
    .result strong { display: block; margin-top: 6px; font-size: 1.55rem; font-variant-numeric: tabular-nums; }
    .formula { padding: 14px; border-top: 1px solid var(--line); line-height: 1.7; font-size: .95rem; font-variant-numeric: tabular-nums; }
    .formula code { display: block; color: #111827; font-family: inherit; font-weight: 800; white-space: normal; }
    .formula .answer { color: var(--blue); font-size: 1.18rem; font-weight: 900; }
    @media (max-width: 1020px) { main { place-items: start center; } .app { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="app">
      <aside class="panel">
        <div class="title">
          <h1>TEG 제벡 전압</h1>
          <p>값은 세 개만 움직입니다. 온도차가 커질수록 그림 속 전하 이동과 제벡 전압이 커집니다.</p>
        </div>
        <div class="controls">
          <div class="control"><div class="control-head"><label for="hot">Heat source 온도</label><span class="value" id="hotValue">180°C</span></div><input id="hot" type="range" min="30" max="300" step="1" value="180" /></div>
          <div class="control"><div class="control-head"><label for="cool">Cool side 온도</label><span class="value" id="coolValue">35°C</span></div><input id="cool" type="range" min="0" max="120" step="1" value="35" /></div>
          <div class="control"><div class="control-head"><label for="seebeck">Seebeck 계수</label><span class="value" id="seebeckValue">200 µV/K</span></div><input id="seebeck" type="range" min="80" max="320" step="5" value="200" /></div>
        </div>
        <p class="note">열전쌍 개수는 교육용 예시로 40개로 고정했습니다. 핵심은 온도차, Seebeck 계수, 제벡 전압 세 가지입니다.</p>
      </aside>

      <article class="panel diagram-panel">
        <div class="diagram-wrap">
          <svg viewBox="0 0 820 620" role="img" aria-label="TEG 제벡 효과 도식">
            <defs>
              <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#172033"></path></marker>
              <linearGradient id="heatGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#ff493d"></stop><stop offset="100%" stop-color="#b80f0f"></stop></linearGradient>
              <linearGradient id="coolGrad" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#2014d6"></stop><stop offset="100%" stop-color="#4259ff"></stop></linearGradient>
            </defs>
            <rect width="820" height="620" fill="#fff"></rect>
            <text x="410" y="40" text-anchor="middle" class="svg-title">Thermoelectric Generator</text>
            <text x="410" y="66" text-anchor="middle" class="svg-sub">Seebeck effect: temperature difference creates voltage</text>
            <g transform="translate(160 95)">
              <rect id="heatSource" x="110" y="0" width="300" height="72" rx="4" fill="url(#heatGrad)" stroke="#7f1d1d" stroke-width="3"></rect>
              <text id="heatLabel" x="260" y="45" text-anchor="middle" font-size="30" font-weight="900" fill="#111827">Heat source 180°C</text>
              <rect class="heat-band" x="110" y="72" width="300" height="44" fill="#d9d9d9" stroke="#7b8794" stroke-width="2"></rect>
              <path d="M166 94 H344" stroke="#172033" stroke-width="5" marker-end="url(#arrow)"></path>
              <rect id="nLeg" x="110" y="116" width="142" height="188" fill="var(--cyan)" stroke="#279ba1" stroke-width="3"></rect>
              <rect id="pLeg" x="278" y="116" width="132" height="188" fill="var(--yellow)" stroke="#c4a12a" stroke-width="3"></rect>
              <rect x="252" y="116" width="26" height="188" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"></rect>
              <text x="181" y="188" text-anchor="middle" font-size="54" font-weight="900" fill="#111827">n</text>
              <text x="344" y="188" text-anchor="middle" font-size="54" font-weight="900" fill="#111827">p</text>
              <g id="nCarriers"><circle cx="150" cy="152" r="16" fill="#fff" stroke="#64748b" stroke-width="2"></circle><text class="carrier d1" x="143" y="160">-</text><path d="M150 174 V230" stroke="#172033" stroke-width="4" marker-end="url(#arrow)"></path><circle cx="210" cy="218" r="15" fill="#fff" stroke="#64748b" stroke-width="2"></circle><text class="carrier d3" x="203" y="226">-</text><path d="M210 240 V282" stroke="#172033" stroke-width="4" marker-end="url(#arrow)"></path></g>
              <g id="pCarriers"><circle cx="370" cy="152" r="16" fill="#fff" stroke="#64748b" stroke-width="2"></circle><text class="carrier d2" x="362" y="160">+</text><path d="M370 174 V230" stroke="#172033" stroke-width="4" marker-end="url(#arrow)"></path><circle cx="318" cy="218" r="15" fill="#fff" stroke="#64748b" stroke-width="2"></circle><text class="carrier d4" x="310" y="226">+</text><path d="M318 240 V282" stroke="#172033" stroke-width="4" marker-end="url(#arrow)"></path></g>
              <rect x="78" y="304" width="200" height="52" fill="#d9d9d9" stroke="#7b8794" stroke-width="2"></rect><rect x="278" y="304" width="164" height="52" fill="#d9d9d9" stroke="#7b8794" stroke-width="2"></rect>
              <path d="M124 330 H240" stroke="#172033" stroke-width="5" marker-end="url(#arrow)"></path><path d="M318 330 H404" stroke="#172033" stroke-width="5" marker-end="url(#arrow)"></path>
              <rect id="coolSide" x="42" y="356" width="440" height="72" rx="4" fill="url(#coolGrad)" stroke="#1713a8" stroke-width="3"></rect>
              <text id="coolLabel" x="262" y="402" text-anchor="middle" font-size="34" font-weight="900" fill="#fff">Cool side 35°C</text>
              <path d="M42 392 H-20 V500 H165" fill="none" stroke="#596575" stroke-width="4" stroke-linejoin="round"></path><path d="M482 392 H544 V500 H360" fill="none" stroke="#596575" stroke-width="4" stroke-linejoin="round"></path>
              <path class="voltage-glow" d="M165 500 l20 -44 l20 88 l20 -88 l20 88 l20 -88 l20 88 l20 -44 h25" fill="none" stroke="#172033" stroke-width="4" stroke-linejoin="round"></path>
              <text x="262" y="585" text-anchor="middle" class="svg-label">voltage appears across the load</text>
            </g>
            <g><rect x="628" y="150" width="150" height="154" rx="8" fill="#f8fafc" stroke="#d8e1eb"></rect><text id="dtSvg" x="646" y="188" class="svg-label">ΔT = 145 K</text><text id="sSvg" x="646" y="222" class="svg-small">S = 200 µV/K</text><text id="vSvg" x="646" y="256" class="svg-small">V = 1.160 V</text><rect x="646" y="276" width="110" height="10" rx="5" fill="#e2e8f0"></rect><rect id="voltageBar" x="646" y="276" width="58" height="10" rx="5" fill="#315edb"></rect></g>
          </svg>
        </div>
      </article>

      <aside class="panel">
        <div class="title"><h2>변화되는 값 3개</h2><p>복잡한 출력 그래프 대신 핵심 계산만 보여줍니다.</p></div>
        <div class="results"><div class="result"><span>온도차 ΔT</span><strong id="dtResult">145 K</strong></div><div class="result"><span>Seebeck 계수 S</span><strong id="sResult">200 µV/K</strong></div><div class="result"><span>제벡 전압 V</span><strong id="vResult">1.160 V</strong></div></div>
        <div class="formula"><code>ΔT = T_hot - T_cold</code><code>V = S × N × ΔT</code><code>N = 40 fixed</code><code class="answer" id="formulaResult">V = 1.160 V</code></div>
      </aside>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const pairs = 40;
    const inputs = { hot: $("hot"), cool: $("cool"), seebeck: $("seebeck") };
    function fmt(value, digits = 2) { return value.toLocaleString("ko-KR", { minimumFractionDigits: digits, maximumFractionDigits: digits }); }
    function readValues() { const hot = Number(inputs.hot.value); let cool = Number(inputs.cool.value); if (cool >= hot) { cool = hot - 1; inputs.cool.value = String(cool); } const seebeck = Number(inputs.seebeck.value); const deltaT = hot - cool; const voltage = seebeck * 1e-6 * pairs * deltaT; return { hot, cool, seebeck, deltaT, voltage }; }
    function setText(id, text) { $(id).textContent = text; }
    function render() {
      const v = readValues();
      const heatLevel = Math.min(1, v.deltaT / 270);
      const voltageLevel = Math.min(1, v.voltage / 2.8);
      setText("hotValue", `${fmt(v.hot, 0)}°C`); setText("coolValue", `${fmt(v.cool, 0)}°C`); setText("seebeckValue", `${fmt(v.seebeck, 0)} µV/K`);
      setText("heatLabel", `Heat source ${fmt(v.hot, 0)}°C`); setText("coolLabel", `Cool side ${fmt(v.cool, 0)}°C`);
      setText("dtSvg", `ΔT = ${fmt(v.deltaT, 0)} K`); setText("sSvg", `S = ${fmt(v.seebeck, 0)} µV/K`); setText("vSvg", `V = ${fmt(v.voltage, 3)} V`);
      setText("dtResult", `${fmt(v.deltaT, 0)} K`); setText("sResult", `${fmt(v.seebeck, 0)} µV/K`); setText("vResult", `${fmt(v.voltage, 3)} V`); setText("formulaResult", `V = ${fmt(v.voltage, 3)} V`);
      document.documentElement.style.setProperty("--heatPower", String(.18 + heatLevel * .82));
      document.documentElement.style.setProperty("--carrierAlpha", String(.35 + voltageLevel * .65));
      document.documentElement.style.setProperty("--carrierSpeed", `${Math.max(.65, 3.6 - heatLevel * 2.5)}s`);
      document.documentElement.style.setProperty("--voltageGlow", String(.1 + voltageLevel * .9));
      $("heatSource").setAttribute("opacity", String(.72 + heatLevel * .28)); $("nLeg").setAttribute("opacity", String(.78 + heatLevel * .22)); $("pLeg").setAttribute("opacity", String(.78 + heatLevel * .22)); $("voltageBar").setAttribute("width", String(8 + voltageLevel * 102));
    }
    Object.values(inputs).forEach((input) => { input.addEventListener("input", render); input.addEventListener("change", render); });
    render();
  </script>
</body>
</html>
