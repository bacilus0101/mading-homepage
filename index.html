<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발표 자료 모음</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans KR", "Pretendard", Arial, sans-serif;
      color: #f3f7fb;
      background: radial-gradient(circle at 12% 14%, rgba(56,189,248,.18), transparent 30%), radial-gradient(circle at 88% 10%, rgba(168,85,247,.16), transparent 28%), linear-gradient(180deg,#08111f 0%,#0d1624 48%,#101722 100%);
    }
    header { padding: 28px clamp(18px,4vw,56px) 20px; border-bottom: 1px solid rgba(255,255,255,.1); background: rgba(8,17,31,.72); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 10; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; max-width: 1280px; margin: 0 auto; }
    h1 { margin: 0; font-size: clamp(28px,4vw,48px); line-height: 1.08; letter-spacing: 0; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    label { color: #b7c6d8; font-size: 14px; font-weight: 700; }
    select, a.button { min-height: 44px; border: 1px solid rgba(255,255,255,.16); border-radius: 8px; background: rgba(255,255,255,.08); color: #f3f7fb; padding: 0 14px; font: inherit; font-weight: 800; }
    select { min-width: min(360px, calc(100vw - 36px)); }
    select option { color: #111827; background: #fff; }
    a.button { display: inline-flex; align-items: center; text-decoration: none; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px clamp(12px,3vw,32px) 32px; }
    .viewer { height: calc(100vh - 142px); min-height: 620px; overflow: hidden; border: 1px solid rgba(255,255,255,.12); border-radius: 8px; background: #fff; box-shadow: 0 24px 70px rgba(0,0,0,.34); }
    iframe { width: 100%; height: 100%; border: 0; background: #fff; }
    @media (max-width: 760px) { header { position: static; } .controls, select, a.button { width: 100%; } .viewer { height: 78vh; min-height: 520px; } }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <h1>발표 자료 모음</h1>
      <div class="controls">
        <label for="deckSelect">자료 선택</label>
        <select id="deckSelect">
          <option value="pages/quantum-dot.html">퀀텀닷 연구 및 산업 동향</option>
          <option value="pages/ultrasonic.html">개방형 초음파 센서 발표 자료</option>
        </select>
        <a class="button" id="openButton" href="pages/quantum-dot.html" target="_blank" rel="noopener">새 창 열기</a>
      </div>
    </div>
  </header>
  <main>
    <div class="viewer">
      <iframe id="viewer" src="pages/quantum-dot.html" title="선택한 발표 자료"></iframe>
    </div>
  </main>
  <script>
    const select = document.getElementById("deckSelect");
    const viewer = document.getElementById("viewer");
    const openButton = document.getElementById("openButton");
    function showDeck(path) {
      viewer.src = path;
      openButton.href = path;
      const url = new URL(window.location.href);
      url.searchParams.set("deck", path);
      history.replaceState(null, "", url);
    }
    const initialDeck = new URLSearchParams(window.location.search).get("deck");
    if (initialDeck && [...select.options].some((option) => option.value === initialDeck)) {
      select.value = initialDeck;
      showDeck(initialDeck);
    }
    select.addEventListener("change", () => showDeck(select.value));
  </script>
</body>
</html>
