    async function loadPresentation() {
      const bytes = Uint8Array.from(atob(compressedHtml), (char) => char.charCodeAt(0));
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const html = await new Response(stream).text();
      document.open();
      document.write(html);
      document.close();
    }

    loadPresentation().catch(() => {
      document.body.innerHTML = '<main style="font-family: sans-serif; padding: 32px; line-height: 1.6;"><h1>발표 자료를 불러오지 못했습니다</h1><p>최신 Chrome 또는 Edge 브라우저에서 다시 열어주세요.</p></main>';
    });
